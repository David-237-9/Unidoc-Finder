# Profile used by the local benchmark runner.

# To stop it from trying to start Tomcat on port 8080.
spring.main.web-application-type=none

# Assumes Elasticsearch is exposed on localhost by docker-compose.
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=30s
spring.elasticsearch.socket-timeout=30s

# Defaults can be overridden with Gradle --args, for example:
# ./gradlew benchmarkSearch --args='--benchmark.rows=20000 --benchmark.iterations=200 --benchmark.query="machine learning"'
benchmark.query=sustainable development
benchmark.rows=5000
benchmark.page=1
benchmark.size=10
benchmark.warmup=10
benchmark.iterations=100
benchmark.index=true

# Delete benchmark documents from Elasticsearch after the run.
benchmark.cleanup=true
